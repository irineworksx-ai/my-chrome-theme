<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Custom Tab</title>

  <!-- Theme color (affects some browser UI slightly) -->
  <meta name="theme-color" content="#0a0a0a">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* Background video or gif */
    video, img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Overlay content */
    .content {
      position: absolute;
      top: 40%;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 50px;
      margin: 0;
    }

    .time {
      font-size: 24px;
      margin-top: 10px;
    }

    /* Search bar */
    input {
      margin-top: 20px;
      padding: 10px;
      width: 300px;
      border-radius: 20px;
      border: none;
      outline: none;
    }
  </style>
</head>

<body>

<!-- USE ONE ONLY -->

<!-- OPTION 1: VIDEO (recommended) -->
<video autoplay muted loop>
  <source src="your-video.mp4" type="video/mp4">
</video>

<!-- OPTION 2: GIF -->
<!-- <img src="your-gif.gif"> -->

<div class="content">
  <h1>Hello 👋</h1>
  <div class="time" id="clock"></div>

  <form action="https://www.google.com/search" method="GET">
    <input type="text" name="q" placeholder="Search Google...">
  </form>
</div>

<script>
  function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
      now.toLocaleTimeString();
  }
  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
